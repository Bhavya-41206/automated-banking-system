<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="staff-dashboard">
  <header class="topbar">
    <a class="brand" href="/staff-dashboard.html"><span class="brand-mark">B</span><span>Staff Portal</span></a>
    <nav class="nav-links">
      <a class="button secondary" href="/manager-dashboard.html">Manager Portal</a>
      <button id="logoutBtn" class="danger" type="button">Logout</button>
    </nav>
  </header>
  <main class="page">
    <h1 id="staffName">Staff Dashboard</h1>
    <section class="content-grid">
      <div class="form-panel">
        <h2>Counter Operations</h2>
        <form id="staffDepositForm">
          <label>Customer Account Number <input name="accountNumber" required></label>
          <label>Amount <input type="number" name="amount" min="1" step="0.01" required></label>
          <button type="submit">Process Deposit</button>
        </form>
        <hr>
        <form id="staffWithdrawForm">
          <label>Customer Account Number <input name="accountNumber" required></label>
          <label>Amount <input type="number" name="amount" min="1" step="0.01" required></label>
          <button class="warning" type="submit">Process Withdrawal</button>
        </form>
        <p id="staffMessage" class="message"></p>
      </div>
      <section class="panel">
        <h2>Customers</h2>
        <form id="customerSearchForm">
          <label>Search <input name="search" placeholder="Name, email, or account number"></label>
          <button type="submit">Search Customers</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Account</th><th>Customer</th><th>Phone</th><th>Type</th><th>Balance</th><th>Status</th></tr></thead>
            <tbody id="customersTable"></tbody>
          </table>
        </div>
      </section>
    </section>

    <section class="panel" style="margin-top:16px">
      <h2>Latest Transactions</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Account</th><th>Type</th><th>Amount</th><th>Balance</th><th>By</th></tr></thead>
          <tbody id="staffTransactionsTable"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
