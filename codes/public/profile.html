<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-page="profile">
  <header class="topbar">
    <a class="brand" href="/dashboard.html"><span class="brand-mark">B</span><span>Customer Portal</span></a>
    <nav class="nav-links">
      <a class="button secondary" href="/dashboard.html">Dashboard</a>
      <button id="logoutBtn" class="danger" type="button">Logout</button>
    </nav>
  </header>
  <main class="auth-layout">
    <section class="auth-card wide">
      <h1>My Profile</h1>
      <form id="profileForm">
        <div class="form-grid">
          <label>Full Name <input name="fullName" required></label>
          <label>Email <input name="email" disabled></label>
          <label>Phone <input name="phone" required></label>
          <label>Account Number <input name="accountNumber" disabled></label>
          <label>Account Type <input name="accountType" disabled></label>
          <label>Status <input name="status" disabled></label>
        </div>
        <label>Address <textarea name="address" rows="3" required></textarea></label>
        <button type="submit">Update Profile</button>
        <p id="profileMessage" class="message"></p>
      </form>
    </section>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
