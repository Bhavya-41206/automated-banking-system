<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator - Automated Banking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .calculator {
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1em;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .value-display {
            font-size: 2em;
            font-weight: bold;
            color: #3498db;
            text-align: center;
            margin-top: 10px;
        }

        .results {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            border-left: 5px solid #3498db;
        }

        .emi-result {
            text-align: center;
            margin-bottom: 30px;
        }

        .emi-amount {
            font-size: 3em;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 10px;
        }

        .total-amount {
            font-size: 1.5em;
            color: #e74c3c;
        }

        .breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .breakdown-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .breakdown-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #3498db;
        }

        .amortization-table {
            max-height: 300px;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #3498db;
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .highlight {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            color: white !important;
        }

        @media (max-width: 768px) {
            .calculator {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 EMI Calculator</h1>
            <p>Calculate your Equated Monthly Installment for bank loans</p>
        </div>

        <div class="calculator">
            <div class="input-section">
                <div class="input-group">
                    <label>Loan Amount (₹)</label>
                    <input type="range" id="loanAmount" min="100000" max="5000000" value="1000000">
                    <div class="value-display" id="loanValue">₹10,00,000</div>
                </div>

                <div class="input-group">
                    <label>Interest Rate (% per annum)</label>
                    <input type="range" id="interestRate" min="6" max="20" step="0.1" value="9">
                    <div class="value-display" id="rateValue">9.0%</div>
                </div>

                <div class="input-group">
                    <label>Loan Tenure (Years)</label>
                    <input type="range" id="tenure" min="1" max="30" value="5">
                    <div class="value-display" id="tenureValue">5 Years</div>
                </div>
            </div>

            <div class="results">
                <div class="emi-result">
                    <div class="emi-amount" id="emiAmount">₹0</div>
                    <div class="total-amount" id="totalAmount">Total: ₹0</div>
                </div>

                <div class="breakdown">
                    <div class="breakdown-item">
                        <div>Principal</div>
                        <div class="breakdown-value" id="principalAmount">₹0</div>
                    </div>
                    <div class="breakdown-item">
                        <div>Total Interest</div>
                        <div class="breakdown-value" id="totalInterest">₹0</div>
                    </div>
                </div>

                <div>
                    <h3 style="margin-bottom: 15px; color: #2c3e50;">📊 Amortization Schedule (First 12 months)</h3>
                    <div class="amortization-table">
                        <table id="amortizationTable">
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>EMI</th>
                                    <th>Principal</th>
                                    <th>Interest</th>
                                    <th>Balance</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loanAmountSlider = document.getElementById('loanAmount');
        const interestRateSlider = document.getElementById('interestRate');
        const tenureSlider = document.getElementById('tenure');

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency',
                currency: 'INR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(amount);
        }

        function formatRate(rate) {
            return rate.toFixed(1) + '%';
        }

        function calculateEMI(principal, annualRate, years) {
            const monthlyRate = annualRate / 12 / 100;
            const months = years * 12;
            const emi = principal * monthlyRate * Math.pow(1 + monthlyRate, months) / 
                       (Math.pow(1 + monthlyRate, months) - 1);
            return emi;
        }

        function generateAmortization(principal, annualRate, years) {
            const monthlyRate = annualRate / 12 / 100;
            const months = years * 12;
            const emi = calculateEMI(principal, annualRate, years);
            let balance = principal;
            const tableBody = document.querySelector('#amortizationTable tbody');
            tableBody.innerHTML = '';

            for (let i = 0; i < Math.min(12, months); i++) {
                const interest = balance * monthlyRate;
                const principalPaid = emi - interest;
                balance -= principalPaid;

                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${formatCurrency(emi)}</td>
                    <td>${formatCurrency(principalPaid)}</td>
                    <td>${formatCurrency(interest)}</td>
                    <td>${formatCurrency(Math.max(0, balance))}</td>
                `;
            }
        }

        function updateDisplay() {
            const principal = parseFloat(loanAmountSlider.value);
            const rate = parseFloat(interestRateSlider.value);
            const years = parseFloat(tenureSlider.value);
            const months = years * 12;

            // Update input displays
            document.getElementById('loanValue').textContent = formatCurrency(principal);
            document.getElementById('rateValue').textContent = formatRate(rate);
            document.getElementById('tenureValue').textContent = years + ' Years';

            // Calculate EMI
            const emi = calculateEMI(principal, rate, years);
            const totalAmount = emi * months;
            const totalInterest = totalAmount - principal;

            // Update results
            document.getElementById('emiAmount').textContent = formatCurrency(emi);
            document.getElementById('totalAmount').textContent = `Total: ${formatCurrency(totalAmount)}`;
            document.getElementById('principalAmount').textContent = formatCurrency(principal);
            document.getElementById('totalInterest').textContent = formatCurrency(totalInterest);

            // Generate amortization table
            generateAmortization(principal, rate, years);
        }

        // Event listeners
        loanAmountSlider.addEventListener('input', updateDisplay);
        interestRateSlider.addEventListener('input', updateDisplay);
        tenureSlider.addEventListener('input', updateDisplay);

        // Initial calculation
        updateDisplay();
    </script>
</body>
</html>
